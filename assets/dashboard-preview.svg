  <g>
    <rect x="896" y="590" width="416" height="156" rx="12" fill="#111827" stroke="#263244"/>
    <text x="920" y="626" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Executive Insight</text>
    <text x="920" y="664" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">EV demand is compounding faster than charging coverage in</text>
    <text x="920" y="690" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">several high-growth markets. Prioritize infrastructure-led</text>
    <text x="920" y="716" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">expansion where YoY growth and coverage gaps overlap.</text>
