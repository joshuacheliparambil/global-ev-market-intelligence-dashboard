    <text x="690" y="538" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="12">2020</text>
    <text x="900" y="538" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="12">2030</text>
  </g>

  <g>
