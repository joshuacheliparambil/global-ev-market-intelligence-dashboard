      <text x="512" y="198" fill="#F8FAFC" font-size="28" font-weight="700">BYD</text>
      <text x="570" y="199" fill="#00E5FF" font-size="13">Rank 1</text>
    </g>
    <g>
      <rect x="702" y="134" width="190" height="96" rx="10" fill="#151C26" stroke="#243244"/>
