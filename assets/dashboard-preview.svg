    <text x="1254" y="349" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13">BYD</text>
    <text x="1210" y="391" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13">Tesla</text>
    <text x="1178" y="433" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13">VW</text>
    <text x="1138" y="475" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13">SAIC</text>
    <text x="1116" y="517" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13">Other</text>
  </g>

  <g>
    <rect x="72" y="590" width="384" height="156" rx="12" fill="#111827" stroke="#263244"/>
    <text x="96" y="626" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Country Growth Leaders</text>
    <text x="96" y="666" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">India</text>
