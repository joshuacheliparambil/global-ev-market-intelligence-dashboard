    <polyline points="690,500 730,484 770,462 810,424 850,372 890,330 930,302" fill="none" stroke="#00E5FF" stroke-width="4"/>
    <polyline points="690,522 730,514 770,498 810,470 850,438 890,410 930,380" fill="none" stroke="#34D399" stroke-width="4"/>
    <g stroke="#223047">
      <line x1="690" y1="520" x2="930" y2="520"/>
      <line x1="690" y1="460" x2="930" y2="460"/>
      <line x1="690" y1="400" x2="930" y2="400"/>
      <line x1="690" y1="340" x2="930" y2="340"/>
