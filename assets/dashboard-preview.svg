    <path d="M151 397 C210 355 271 365 310 402 C351 440 424 411 480 430 C532 449 564 491 525 517 C477 548 386 532 332 512 C270 489 207 519 161 489 C121 463 111 425 151 397Z" fill="#172638" stroke="#314256"/>
    <path d="M204 356 C266 327 347 324 401 355 C448 382 513 359 552 392 C580 416 562 450 523 455 C455 464 392 430 331 448 C274 465 201 435 181 399 C171 381 181 367 204 356Z" fill="#20344B" stroke="#3B536E"/>
