    <text x="96" y="700" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Brazil</text>
    <rect x="172" y="687" width="168" height="18" rx="5" fill="#00E5FF"/>
    <text x="96" y="734" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Thailand</text>
    <rect x="172" y="721" width="136" height="18" rx="5" fill="#F59E0B"/>
  </g>

  <g>
    <rect x="484" y="590" width="384" height="156" rx="12" fill="#111827" stroke="#263244"/>
    <text x="508" y="626" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Charging Infrastructure</text>
    <circle cx="578" cy="683" r="43" fill="none" stroke="#00E5FF" stroke-width="14"/>
    <circle cx="578" cy="683" r="43" fill="none" stroke="#223047" stroke-width="14" stroke-dasharray="80 190"/>
    <text x="553" y="692" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">74</text>
    <text x="652" y="674" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Readiness score</text>
    <text x="652" y="704" fill="#34D399" font-family="Segoe UI, Arial, sans-serif" font-size="15">Fast charging share improving</text>
